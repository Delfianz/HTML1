<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form action="">
      <!-- Text Input -->
      <label for="nama">Nama:</label>
      <input type="text" id="nama" name="nama" placeholder="Masukkan nama" required />

      <!-- Email Input -->
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" placeholder="contoh@email.com" required />

      <!-- Password Input -->
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required />

      <!-- Number Input -->
      <label for="umur">Umur:</label>
      <input type="number" id="umur" name="umur" min="1" max="100" />

      <!-- Date Input -->
      <label for="tanggal">Tanggal Lahir:</label>
      <input type="date" id="tanggal" name="tanggal" />

      <!-- Checkbox -->
      <input type="checkbox" id="setuju" name="setuju" />
      <label for="setuju">Saya setuju dengan syarat dan ketentuan</label>

      <!-- Radio Button -->
      <p>Jenis Kelamin:</p>
      <input type="radio" id="pria" name="gender" value="pria" />
      <label for="pria">Pria</label>
      <input type="radio" id="wanita" name="gender" value="wanita" />
      <label for="wanita">Wanita</label>

      <!-- Textarea -->
      <label for="pesan">Pesan:</label>
      <textarea id="pesan" name="pesan" rows="4" cols="50" placeholder="Tulis pesan..."></textarea>

      <!-- Select (Dropdown) -->
      <label for="kota">Kota:</label>
      <select id="kota" name="kota">
        <option value="">Pilih Kota</option>
        <option value="jakarta">Jakarta</option>
        <option value="bandung">Bandung</option>
        <option value="surabaya">Surabaya</option>
      </select>

      <!-- Submit Button -->
      <button type="submit">Kirim</button>

      <!-- Reset Button -->
      <button type="reset">Reset</button>
    </form>
    <form action="/submit" method="POST">
      <!-- Elemen form di sini -->
      <button type="submit">Kirim</button>
    </form>
  </body>
</html>
